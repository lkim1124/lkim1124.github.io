<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Like Ice Cream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #ffffff 0%, #fff0f3 100%);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* Floating background blobs for a modern, playful feel */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float-bg 20s infinite alternate ease-in-out;
        }
        .blob-1 {
            width: 300px;
            height: 300px;
            background: #ffd3e8;
            top: 20%;
            left: 20%;
        }
        .blob-2 {
            width: 400px;
            height: 400px;
            background: #ffe5b4;
            bottom: 20%;
            right: 15%;
            animation-delay: -5s;
        }
        .blob-3 {
            width: 250px;
            height: 250px;
            background: #d4f0fc;
            bottom: 10%;
            left: 30%;
            animation-delay: -10s;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 40px 60px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 24px 50px rgba(255, 182, 193, 0.15);
            animation: scaleIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ice-cream-icon {
            width: 120px;
            height: 120px;
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 50%, #fe9a8b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            line-height: 1.2;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        /* Keyframes */
        @keyframes float-bg {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.15); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive styling */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            .container {
                width: 90%;
                padding: 30px 20px;
            }
            .ice-cream-icon {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Background visual assets -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <!-- Custom vector illustration of ice cream -->
        <svg class="ice-cream-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Cone -->
            <path d="M50 85L32 50H68L50 85Z" fill="#E5A65D" stroke="#C8853C" stroke-width="3" stroke-linejoin="round"/>
            <path d="M42 50L50 85" stroke="#C8853C" stroke-width="2"/>
            <path d="M58 50L50 85" stroke="#C8853C" stroke-width="2"/>
            
            <!-- Scoops -->
            <circle cx="38" cy="45" r="14" fill="#FFB7B2"/>
            <circle cx="62" cy="45" r="14" fill="#FFB7B2"/>
            <circle cx="50" cy="36" r="18" fill="#FFDAC1"/>
            
            <!-- Cherry -->
            <circle cx="50" cy="16" r="6" fill="#FF6B6B"/>
            <path d="M50 10C53 5 58 7 60 7" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h1>I like ice cream</h1>
    </div>
</body>
</html>
